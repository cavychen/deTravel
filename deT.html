<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2026 年度精選活動與計畫</title>
    <style>
        :root {
            --bg-color: #f4f7f6;
            --text-color: #333;
            --card-1-start: #ff7e5f;
            --card-1-end: #feb47b;
            --card-2-start: #2193b0;
            --card-2-end: #6dd5ed;
            --card-3-start: #11998e;
            --card-3-end: #38ef7d;
        }

        body {
            font-family: "Helvetica Neue", Arial, "Noto Sans TC", "Microsoft JhengHei", sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
        }

        header h1 {
            font-size: 2.5rem;
            color: #2c3e50;
            margin-bottom: 10px;
        }

        header p {
            font-size: 1.1rem;
            color: #7f8c8d;
        }

        .container {
            display: flex;
            flex-direction: column;
            gap: 25px;
            width: 100%;
            max-width: 600px;
        }

        .link-card {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 25px 30px;
            border-radius: 16px;
            text-decoration: none;
            color: white;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .link-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 25px rgba(0,0,0,0.15);
        }

        /* 個別卡片的漸層色彩 */
        .card-1 {
            background: linear-gradient(135deg, var(--card-1-start), var(--card-1-end));
        }

        .card-2 {
            background: linear-gradient(135deg, var(--card-2-start), var(--card-2-end));
        }

        .card-3 {
            background: linear-gradient(135deg, var(--card-3-start), var(--card-3-end));
        }

        .card-content {
            flex: 1;
        }

        .card-title {
            font-size: 1.4rem;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .card-url {
            font-size: 0.85rem;
            opacity: 0.85;
            word-break: break-all;
        }

        .arrow-icon {
            font-size: 1.8rem;
            margin-left: 20px;
            transition: transform 0.3s ease;
        }

        .link-card:hover .arrow-icon {
            transform: translateX(5px);
        }

        footer {
            margin-top: auto;
            padding-top: 40px;
            font-size: 0.9rem;
            color: #bdc3c7;
        }
    </style>
</head>
<body>

    <header>
        <h1>2026 行程與活動指南</h1>
        <p>點擊下方卡片即可前往相關頁面</p>
    </header>

    <div class="container">
        <!-- 連結 1 -->
        <a href="https://cavychen.github.io/summerReviewPlan26/mainP.html" target="_blank" class="link-card card-1">
            <div class="card-content">
                <div class="card-title">2026 暑假全科 1-4 冊均衡複習計畫表</div>
                <div class="card-url">cavychen.github.io/summerReviewPlan26/mainP.html</div>
            </div>
            <div class="arrow-icon">➔</div>
        </a>

        <!-- 連結 2 -->
        <a href="https://cavychen.github.io/deTravel/deT4p.html" target="_blank" class="link-card card-2">
            <div class="card-content">
                <div class="card-title">2026 暑假德國短期</div>
                <div class="card-url">cavychen.github.io/deTravel/deT4p.html</div>
            </div>
            <div class="arrow-icon">➔</div>
        </a>

        <!-- 連結 3 -->
        <a href="https://cavychen.github.io/readBooks/Cafune.html" target="_blank" class="link-card card-3">
            <div class="card-content">
                <div class="card-title">2026 讀書會活動</div>
                <div class="card-url">cavychen.github.io/readBooks/Cafune.html</div>
            </div>
            <div class="arrow-icon">➔</div>
        </a>
    </div>

    <footer>
        &copy; 2026 All Rights Reserved.
    </footer>

</body>
</html>
